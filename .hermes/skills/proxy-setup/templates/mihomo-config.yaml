# mihomo 配置模板
# 使用方法：替换proxies部分的节点信息，其余保持不变

mixed-port: 7890
allow-lan: false
bind-address: "*"
mode: rule
log-level: info
external-controller: 127.0.0.1:9090

dns:
  enable: true
  listen: 0.0.0.0:1053
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 114.114.114.114
  fallback:
    - 8.8.8.8
    - 1.1.1.1
  fallback-filter:
    geoip: true
    geoip-code: CN

# === 节点配置（替换为你的节点） ===
proxies:
  - name: "示例节点"
    type: vless
    server: example.com
    port: 443
    uuid: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
    network: tcp
    tls: true
    udp: true
    flow: xtls-rprx-vision
    servername: www.bing.com
    reality-opts:
      public-key: xxxxx
      short-id: xxxxx
    client-fingerprint: chrome

# === 代理组 ===
proxy-groups:
  - name: "🚀 节点选择"
    type: select
    proxies:
      - "♻️ 自动选择"
      - DIRECT

  - name: "♻️ 自动选择"
    type: url-test
    proxies:
      - "示例节点"
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

# === 分流规则 ===
rules:
  - GEOIP,CN,DIRECT
  - MATCH,🚀 节点选择
